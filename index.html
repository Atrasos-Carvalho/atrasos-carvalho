<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
    <title>Atrasos Carvalho</title>
</head>
<body>
    <section>
        <div class="display">
            <h1>No horário: <p>...</p></h1>
            <h1>Atrasos: <p>...</p></h1>
            <h1>Faltas: <p>...</p></h1>
        </div>
        <div class="btContainer">
            <button class="bt horario" id="btHorario" onclick="registrar('popHorario')">Chegou no horário</button>
            <button class="bt atraso" id="btAtraso" onclick="registrar('popAtraso')">Atrasou</button>
            <button class="bt falta" id="btFalta" onclick="registrar('popFalta')">Faltou</button>
        </div>
        <div class="popups">
            <div class="popup horarioP" id="popHorario">
                <h2>Chegada no horário registrada!</h2>
            </div>
            <div class="popup atrasoP" id="popAtraso">
                <h2>Atraso registrado!</h2>
            </div>
            <div class="popup faltaP" id="popFalta">
                <h2>Falta registrada!</h2>
            </div>
        </div>
        <img src="assets/jao.png" alt="">
    </section>
</body>
</html>
